version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      household-modules:
        patterns:
          - '@lifeos/household-identity-module'
          - '@lifeos/household-chores-module'
          - '@lifeos/household-shopping-module'
          - '@lifeos/household-calendar-module'
          - '@lifeos/household-capture-router-module'
          - '@lifeos/home-state-module'
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: cargo
    directory: '/apps/desktop/src-tauri'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
