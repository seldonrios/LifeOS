name: CLI Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20.19.0']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: CLI version
        run: pnpm lifeos --version
      - name: CLI status smoke
        run: pnpm lifeos status --json --graph-path ./.tmp/lifeos-smoke/life-graph.json
      - name: CLI demo dry-run smoke
        run: pnpm lifeos demo --dry-run --goal "Smoke test goal" --graph-path ./.tmp/lifeos-smoke/life-graph.json
