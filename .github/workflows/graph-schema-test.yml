name: Graph Schema Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:graph
