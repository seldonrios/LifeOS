# Required secret: EXPO_TOKEN
name: EAS Preview

on:
  push:
    branches: [main]
    paths:
      - apps/mobile/**
      - .github/workflows/eas-preview.yml

permissions:
  # Required for commit comments that link the preview build back to the pushed SHA.
  contents: write

concurrency:
  group: eas-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eas-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Detect Expo token availability
        id: expo_token
        run: |
          if [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pnpm
        if: steps.expo_token.outputs.available == 'true'
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        if: steps.expo_token.outputs.available == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: pnpm
      - name: Install dependencies
        if: steps.expo_token.outputs.available == 'true'
        run: pnpm install --frozen-lockfile
      - name: Setup Expo
        if: steps.expo_token.outputs.available == 'true'
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Run EAS preview build
        if: steps.expo_token.outputs.available == 'true'
        working-directory: apps/mobile
        run: npx --yes eas-cli@latest build --platform all --profile preview --non-interactive --json > eas-build.json
      - name: Comment build URL on commit
        if: steps.expo_token.outputs.available == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/mobile/eas-build.json';
            const raw = fs.readFileSync(path, 'utf8').trim();
            const parsed = JSON.parse(raw);
            const builds = Array.isArray(parsed) ? parsed : [parsed];
            const urls = builds
              .map((b) => b?.buildDetailsPageUrl)
              .filter((url) => typeof url === 'string' && url.length > 0);
            const body = urls.length > 0
              ? `EAS preview build started:\n${urls.map((url) => `- ${url}`).join('\n')}`
              : 'EAS preview build started, but no build URL was found in output.';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
      - name: Skip preview when EXPO_TOKEN is unavailable
        if: steps.expo_token.outputs.available != 'true'
        run: |
          echo "::warning::EXPO_TOKEN is not configured. Skipping EAS preview build."
