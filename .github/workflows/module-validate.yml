name: Module Validate

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'templates/module/**'
      - 'community-modules.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm lifeos module validate --all
      - run: pnpm lifeos module certify --dry-run
