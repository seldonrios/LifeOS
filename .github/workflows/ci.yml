name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    env:
      NODE_ENV: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['20.19.0']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
      - run: uv tool install ruff
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run validate
      # Initial threshold 60% (packages) / 50% (modules, services) - raise by 5% per quarter.
      - name: Enforce module/service coverage thresholds
        run: |
          pnpm --filter @lifeos/household-identity-module run test
          pnpm --filter @lifeos/household-chores-module run test
          pnpm --filter @lifeos/household-shopping-module run test
          pnpm --filter @lifeos/dashboard-service run test
          pnpm --filter @lifeos/home-node-service run test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-node${{ matrix.node }}
          path: |
            packages/*/coverage/
            modules/*/coverage/
            services/*/coverage/
      - name: Hero loop integration test
        run: pnpm --filter @lifeos/cli exec tsx --test src/hero-loop.integration.test.ts
      - name: Generate release evidence
        if: always()
        run: pnpm exec tsx scripts/generate-release-evidence.ts
        env:
          LIFEOS_CI_OS: ${{ matrix.os }}
          LIFEOS_CI_NODE: ${{ matrix.node }}
          LIFEOS_CI_WORKFLOW: ${{ github.workflow }}
          LIFEOS_CI_RUN_ID: ${{ github.run_id }}
          LIFEOS_CI_SHA: ${{ github.sha }}
          LIFEOS_CI_REF: ${{ github.ref }}
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-evidence-${{ matrix.os }}-node${{ matrix.node }}
          path: .artifacts/release-evidence/

  core-loop-integration:
    runs-on: ubuntu-latest
    needs: validate
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:core-loop
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: core-loop-logs
          path: logs/

  home-node-integration:
    runs-on: ubuntu-latest
    needs: validate
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lifeos/home-node-service test

  security-audit:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high

  desktop-ui-e2e:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lifeos/desktop exec playwright install --with-deps chromium
      - run: pnpm --filter @lifeos/desktop run dev:web &
      - run: npx wait-on --timeout 120000 http://localhost:5173
      - run: pnpm --filter @lifeos/desktop exec playwright test
