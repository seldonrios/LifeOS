name: Works with LifeOS Profile

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'templates/module/**'
      - 'community-modules.json'
      - '.github/workflows/works-with-lifeos-profile.yml'
  workflow_dispatch:

jobs:
  module-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:modules
      - run: pnpm lifeos module validate --all
