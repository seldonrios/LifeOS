name: Release Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required to create GitHub releases from pushed version tags.
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
