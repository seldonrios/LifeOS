name: Mesh Integration

on:
  pull_request:
    paths:
      - 'packages/mesh/**'
      - 'packages/cli/**'
      - '.github/workflows/mesh-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mesh-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lifeos/mesh run test
      - run: pnpm --filter @lifeos/cli run test
