name: Mesh Integration

on:
  pull_request:
    paths:
      - 'packages/mesh/**'
      - 'packages/cli/**'
      - '.github/workflows/mesh-integration.yml'
  workflow_dispatch:

jobs:
  mesh-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lifeos/mesh run test
      - run: pnpm --filter @lifeos/cli run test
