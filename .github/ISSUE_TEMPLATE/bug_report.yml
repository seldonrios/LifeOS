name: Bug report
description: Report a reproducible problem in LifeOS
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Share a minimal repro so maintainers can verify quickly.
        Privacy notice: do not paste personal data (emails, phone numbers, addresses, health/finance details). Use redacted placeholders.
  - type: input
    id: lifeos_version
    attributes:
      label: LifeOS version
      description: Output of `pnpm lifeos --version` or the commit hash.
      placeholder: v0.3.0 or <commit-hash>
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: repro_steps
    attributes:
      label: Reproduction steps
      description: Provide exact commands and inputs. Include a minimal command sequence maintainers can run.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs or stack traces. Redact secrets.
      render: shell
