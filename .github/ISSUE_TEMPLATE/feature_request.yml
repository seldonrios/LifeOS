name: Feature request
description: Suggest a capability improvement for LifeOS
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and expected UX.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope area
      options:
        - CLI
        - Core runtime
        - Modules
        - Mesh and sync
        - Marketplace and trust
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workaround or competing approach.
