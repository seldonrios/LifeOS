services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lifeos']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [lifeos-network]

  life-graph-db:
    image: neo4j:5-community
    env_file: .env
    ports:
      - '7474:7474'
      - '7687:7687'
    networks: [lifeos-network]

  nats:
    image: nats:2-alpine
    env_file: .env
    command: ['--config', '/etc/nats/nats-server.conf']
    depends_on:
      init-db:
        condition: service_completed_successfully
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - ./config/nats-server.conf:/etc/nats/nats-server.conf:ro
      - ./.nats/resolver:/data/resolver
    networks: [lifeos-network]

  opa:
    image: openpolicyagent/opa:latest-static
    env_file: .env
    command: ['run', '--server', '--addr=0.0.0.0:8181']
    ports:
      - '8181:8181'
    networks: [lifeos-network]

  init-db:
    image: postgres:16
    env_file: .env
    command: ['/scripts/init-postgres.sh']
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    restart: 'no'
    networks: [lifeos-network]

  module-loader:
    build:
      context: .
      dockerfile: services/module-loader/Dockerfile
    env_file: .env
    environment:
      LIFEOS_MODULES_DIR: /app/modules
      LIFEOS_PROFILE: assistant
    ports:
      - '3009:3009'
    depends_on:
      init-db:
        condition: service_completed_successfully
    volumes:
      - ./modules:/app/modules:ro
    networks: [lifeos-network]

  reasoning-service:
    build:
      context: .
      dockerfile: services/reasoning/Dockerfile
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  goal-engine-service:
    build:
      context: .
      dockerfile: services/goal-engine/Dockerfile
    env_file: .env
    ports:
      - '3002:3002'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  agent-mesh-service:
    build:
      context: .
      dockerfile: services/agent-mesh/Dockerfile
    env_file: .env
    ports:
      - '3003:3003'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  simulation-service:
    build:
      context: .
      dockerfile: services/simulation/Dockerfile
    env_file: .env
    ports:
      - '3004:3004'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: .env
    ports:
      - '3005:3005'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  secrets-service:
    build:
      context: .
      dockerfile: services/secrets/Dockerfile
    env_file: .env
    ports:
      - '3006:3006'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  service-catalog:
    build:
      context: .
      dockerfile: services/service-catalog/Dockerfile
    env_file: .env
    ports:
      - '3007:3007'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  feature-flag-service:
    build:
      context: .
      dockerfile: services/feature-flags/Dockerfile
    env_file: .env
    ports:
      - '3008:3008'
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks: [lifeos-network]

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    env_file: .env
    ports:
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    networks: [lifeos-network]

  tempo:
    image: grafana/tempo:latest
    env_file: .env
    ports:
      - '3200:3200'
    networks: [lifeos-network]

  grafana:
    image: grafana/grafana:latest
    env_file: .env
    ports:
      - '3100:3100'
    networks: [lifeos-network]

networks:
  lifeos-network:
    driver: bridge
