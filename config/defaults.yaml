profile: assistant
logLevel: info

smtp:
  host: localhost
  port: 1025

features:
  voice: true
  vision: false
  localLlm: true
  cloudLlm: false
  automation: true
  scheduling: true
  deviceControl: false
  backgroundAgents: true

security:
  policyEnforce: true
  failClosed: true
  moduleManifestRequired: true
  moduleRuntimePermissions: strict

transparency:
  trustDashboardEnabled: true
  explanationLoggingEnabled: true
  userOwnershipMessaging: direct-friendly

services:
  secretsService:
    host: secrets-service
    port: 4101
  serviceCatalog:
    host: service-catalog
    port: 4102
  featureFlagService:
    host: feature-flag-service
    port: 4103
  moduleLoader:
    host: module-loader
    port: 4104

modules:
  enabled:
    - reasoning-engine
    - goal-engine
    - calendar
    - health

hardware:
  available: []
