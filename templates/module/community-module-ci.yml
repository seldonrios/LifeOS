name: External Module CI Example

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'lifeos.json'
      - 'package.json'

jobs:
  validate-module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:modules
      - run: pnpm lifeos module validate --all
